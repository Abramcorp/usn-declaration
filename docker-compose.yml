version: "3.8"

services:
  app:
    build: .
    container_name: usn-declaration
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist database and generated files between container restarts
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - NO_BROWSER=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
